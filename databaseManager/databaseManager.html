<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS - Database Manager</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="databaseManager.css">
</head>
<body class="dbm-page">
    <div id="password-overlay">
        <div class="password-box">
            <h3>[ Access Locked ]</h3>
            <p>데이터 관리를 위해 비밀번호를 입력하세요.</p>
            <input type="password" id="db-password" placeholder="Password" onkeydown="if(event.key==='Enter') verifyPassword()">
            <button onclick="verifyPassword()" class="btn btn-primary">인증</button>
            <div id="pw-error" class="log-error" style="margin-top: 10px; font-size: 0.8rem; display: none;">비밀번호가 틀렸습니다.</div>
        </div>
    </div>

    <main class="container-fluid py-4">
        <div class="dbm-layout">
            <!-- Sidebar: DB & Store Selection -->
            <aside class="dbm-sidebar">
                <section class="content-section">
                    <div class="section-header">
                        <h2 class="section-title">DataBase</h2>
                        <button class="btn btn-sm btn-primary" onclick="createNewDB()">ADD</button>
                    </div>
                    <div class="sidebar-body">
                        <div id="tree-root" class="dbm-tree"></div>
                    </div>
                </section>
            </aside>

            <!-- Main: Data Display & Actions -->
            <article class="dbm-content">
                <section class="content-section">
                    <div class="section-header">
                        <h2 class="section-title" id="path-display">Explorer</h2>
                        <div class="dbm-actions">
                            <input type="file" id="import-file" class="hidden" accept=".json" onchange="handleFile(this.files[0])">
                            <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Import</button>
                            <button class="btn btn-primary" onclick="processExport()">Export</button>
                        </div>
                    </div>
                    <div class="section-body">
                        <div id="data-preview-container" class="data-view">
                            <div id="welcome-msg" class="empty-state">
                                <p>Select a store from the sidebar to explore data.</p>
                            </div>
                            <div id="data-table-wrapper" class="hidden">
                                <table id="data-table">
                                    <thead>
                                        <tr id="table-header"></tr>
                                    </thead>
                                    <tbody id="table-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Console: Activity Log -->
                <section class="content-section">
                    <div class="section-header">
                        <h2 class="section-title">콘솔 로그</h2>
                        <button onclick="clearConsole()" class="btn-clear">Clear</button>
                    </div>
                    <div id="console-log" class="console-box"></div>
                </section>
            </article>
        </div>
    </main>

    <script src="../script.js"></script>
    <script src="databaseManager.js"></script>
</body>
</html>
