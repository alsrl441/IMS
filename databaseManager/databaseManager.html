    <meta charset="UTF-8">

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="databaseManager.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <div class="nav-item">
                    <a href="../index.html" class="nav-link">홈</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link active">업무</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">비업무</a>
                </div>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
            </div>
        </div>

        <div class="mega-menu">
            <div class="mega-menu-container">
                <div class="mega-menu-column">
                    <a href="../index.html" class="mega-menu-item">대시보드</a>
                </div>
                <div class="mega-menu-column">
                    <a href="../shipDB/identified/identified.html" class="mega-menu-item">식별 선박 DB</a>
                    <a href="../shipDB/unidentified/unidentified.html" class="mega-menu-item">미식별 선박 DB</a>
                    <a href="../shipTrace/shipTrace.html" class="mega-menu-item">선박 추적</a>
                    <a href="../workSchedule/workSchedule.html" class="mega-menu-item">근무표</a>
                </div>
                <div class="mega-menu-column">
                    <a href="../personnel/personnel.html" class="mega-menu-item">인사 정보</a>

<div id="password-overlay">
    <div class="password-box">
        <h3>[ Access Locked ]</h3>
        <p>Please enter password.</p>
        <input type="password" id="db-password" placeholder="Password" onkeydown="if(event.key==='Enter') verifyPassword()">
        <button onclick="verifyPassword()" class="btn btn-primary">Verify</button>
        <div id="pw-error" class="log-error" style="margin-top: 10px; font-size: 0.8rem; display: none;">wrong password.</div>
    </div>
</div>

<div class="wrapper" id="wrapper">
    <aside id="sidebar">
        <div class="sidebar-header">
            <h6>DATABASE</h6>
            <button class="add-db-btn" onclick="createNewDB()">ADD DB</button>
        </div>
        <div id="tree-root"></div>
    </aside>

    <main id="main">
        <header class="header-controls">
            <div class="path-info">
                <span id="path-display">PATH: ROOT</span>
                <span id="status-msg"></span>
            </div>
            <div class="button-group">
                <input type="file" id="import-file" class="hidden" accept=".json,.js" onchange="handleFile(this.files[0])">
                <button class="btn btn-outline-secondary" onclick="document.getElementById('import-file').click()">Import</button>
                <button class="btn btn-outline-secondary" onclick="processExport()">Export</button>
                <button class="btn btn-primary" onclick="saveData()">Save Changes</button>
            </div>
        </header>

        <div id="editor-container">
            <textarea id="json-editor" style="display:none;" spellcheck="false" placeholder="Enter JSON data here..."></textarea>
            <div id="welcome-msg">
                <h3 style="font-weight: 300;">Select a store from the sidebar.</h3>
            </div>
        </div>

        <footer id="console-container">
            <div class="console-header">
                <span>CONSOLE</span>
                <button onclick="clearConsole()" class="btn-clear">Clear</button>
            </div>
            <div id="console-log"></div>
        </footer>
    </main>
</div>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

<script src="../script.js"></script>
<script src="databaseManager.js"></script>
</body>
</html>
