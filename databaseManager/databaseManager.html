<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS - Database Manager</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="databaseManager.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <div class="nav-item">
                    <a href="../index.html" class="nav-link">홈</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link active">업무</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">비업무</a>
                </div>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
            </div>
        </div>

        <div class="mega-menu">
            <div class="mega-menu-container">
                <div class="mega-menu-column">
                    <a href="../index.html" class="mega-menu-item">대시보드</a>
                </div>
                <div class="mega-menu-column">
                    <a href="../shipDB/identified/identified.html" class="mega-menu-item">식별 선박 DB</a>
                    <a href="../shipDB/unidentified/unidentified.html" class="mega-menu-item">미식별 선박 DB</a>
                    <a href="../shipTrace/shipTrace.html" class="mega-menu-item">선박 추적</a>
                    <a href="../workSchedule/workSchedule.html" class="mega-menu-item">근무표</a>
                </div>
                <div class="mega-menu-column">
                    <a href="../personnel/personnel.html" class="mega-menu-item">인사 정보</a>
                    <a href="../wiki/wiki.html" class="mega-menu-item">Wiki</a>
                    <a href="../mealSchedule/mealSchedule.html" class="mega-menu-item">식단표</a>
                    <a href="../game/game.html" class="mega-menu-item game-link">놀이터</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="password-overlay">
        <div class="password-box">
            <h3>[ Access Locked ]</h3>
            <p>데이터 관리를 위해 비밀번호를 입력하세요.</p>
            <input type="password" id="db-password" placeholder="Password" onkeydown="if(event.key==='Enter') verifyPassword()">
            <button onclick="verifyPassword()" class="btn btn-primary">인증</button>
            <div id="pw-error" class="log-error" style="margin-top: 10px; font-size: 0.8rem; display: none;">비밀번호가 틀렸습니다.</div>
        </div>
    </div>

    <main class="container py-4">
        <div class="dbm-layout">
            <!-- Sidebar: DB & Store Selection -->
            <aside class="dbm-sidebar">
                <section class="content-section">
                    <div class="section-header">
                        <h2 class="section-title">DB 목록</h2>
                        <button class="btn btn-sm btn-primary" onclick="createNewDB()">추가</button>
                    </div>
                    <div class="sidebar-body">
                        <div id="tree-root" class="dbm-tree"></div>
                    </div>
                </section>
            </aside>

            <!-- Main: Data Display & Actions -->
            <article class="dbm-content">
                <section class="content-section">
                    <div class="section-header">
                        <h2 class="section-title" id="path-display">데이터 탐색</h2>
                        <div class="dbm-actions">
                            <input type="file" id="import-file" class="hidden" accept=".json" onchange="handleFile(this.files[0])">
                            <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">가져오기 (Import)</button>
                            <button class="btn btn-primary" onclick="processExport()">내보내기 (Export)</button>
                        </div>
                    </div>
                    <div class="section-body">
                        <div id="data-preview-container" class="data-view">
                            <div id="welcome-msg" class="empty-state">
                                <p>왼쪽 목록에서 스토어를 선택하여 데이터를 확인하세요.</p>
                            </div>
                            <div id="data-table-wrapper" class="hidden">
                                <table id="data-table">
                                    <thead>
                                        <tr id="table-header"></tr>
                                    </thead>
                                    <tbody id="table-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Console: Activity Log -->
                <section class="content-section">
                    <div class="section-header">
                        <h2 class="section-title">활동 로그</h2>
                        <button onclick="clearConsole()" class="btn-clear">지우기</button>
                    </div>
                    <div id="console-log" class="console-box"></div>
                </section>
            </article>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="databaseManager.html">DBM</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="databaseManager.js"></script>
</body>
</html>
