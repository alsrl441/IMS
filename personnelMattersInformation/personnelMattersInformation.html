<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사 정보</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="personnelMattersInformation.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="personnelMattersInformation.html" class="nav-link active">인사 정보</a>
                <div class="nav-item-dropdown">
                    <a href="#" class="nav-link">선박 DB</a>
                    <div class="dropdown-menu">
                        <a href="../shipDB/identified/identified.html" class="dropdown-item">식별 선박</a>
                        <a href="../shipDB/unidentified/unidentified.html" class="dropdown-item">미식별 선박</a>
                    </div>
                </div>
                <a href="../shipTrace/shipTrace.html" class="nav-link">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="profile-layout">
            <section class="card shadow-sm mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">인사 정보</h5>
                    <div class="d-flex align-items-center gap-2">
                        <button id="addMemberBtn" class="btn-minimal-sm"><i class="fas fa-plus mr-1"></i>추가</button>
                        <div class="selector-wrapper">
                            <select id="memberSelect" class="form-select">
                                <option value="">인원을 선택하세요</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div id="resultDisplay" class="result-content hidden">
                        <!-- Top Profile Section -->
                        <div class="profile-header-minimal mb-4">
                            <div class="profile-photo-area">
                                <img id="resPhoto" src="../img/default-profile.png" alt="Profile" class="profile-photo-square">
                            </div>
                            <div class="profile-title-area">
                                <div id="resNickName" class="nickname-top"></div>
                                <div class="progress-wrapper-minimal mt-2">
                                    <div class="progress-bar-container-minimal">
                                        <div id="progressBarFill" class="progress-bar-fill-minimal"></div>
                                    </div>
                                    <div id="resPercent" class="percent-label-minimal"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Info Grid Section -->
                        <div class="profile-info-grid">
                            <div class="info-column">
                                <div class="info-row-minimal">
                                    <label>이름</label>
                                    <span id="resName"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>계급</label>
                                    <span id="resRankStatus"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>소속</label>
                                    <span id="resAffiliation"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>보직</label>
                                    <span id="resPosition"></span>
                                </div>
                            </div>
                            <div class="info-column">
                                <div class="info-row-minimal">
                                    <label>입대일</label>
                                    <span id="resStartDate"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>전역일</label>
                                    <span id="resEndDate"></span>
                                </div>
                                <div class="info-row-minimal highlight-dday">
                                    <label>전역 D-day</label>
                                    <span id="resDday"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>다음 진급일</label>
                                    <span id="resPromoDate"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>진급 D-day</label>
                                    <span id="resPromoDday"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>다음 휴가일</label>
                                    <span id="resVacationRange"></span>
                                </div>
                                <div class="info-row-minimal">
                                    <label>휴가 D-day</label>
                                    <span id="resVacDday"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons at Bottom Right -->
                        <div class="profile-actions-footer mt-4">
                            <button id="editMemberBtn" class="btn-minimal-sm text-primary">수정</button>
                            <button id="deleteMemberBtn" class="btn-minimal-sm text-danger">삭제</button>
                        </div>
                    </div>

                    <div id="noDataMessage" class="text-center py-5 text-muted">
                    </div>
                </div>
            </section>

            <div id="previewDisplay" class="preview-grid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <!-- Member Management Modal -->
    <div id="memberModal" class="modal-overlay hidden">
        <div class="modal-content-minimal">
            <div class="modal-header">
                <h5 id="modalTitle">인원 추가</h5>
                <button id="closeModal" class="btn-close">&times;</button>
            </div>
            <form id="memberForm" class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>이름</label>
                        <input type="text" id="mName" required>
                    </div>
                    <div class="form-group">
                        <label>별명</label>
                        <input type="text" id="mNickName">
                    </div>
                    <div class="form-group">
                        <label>소속</label>
                        <input type="text" id="mAffiliation">
                    </div>
                    <div class="form-group">
                        <label>보직</label>
                        <input type="text" id="mPosition">
                    </div>
                    <div class="form-group">
                        <label>입대일</label>
                        <input type="date" id="mStart" required>
                    </div>
                    <div class="form-group">
                        <label>전역일</label>
                        <input type="date" id="mEnd" required>
                    </div>
                    <div class="form-group">
                        <label>휴가 시작</label>
                        <input type="date" id="mVacStart">
                    </div>
                    <div class="form-group">
                        <label>휴가 종료</label>
                        <input type="date" id="mVacEnd">
                    </div>
                    <div class="form-group">
                        <label>일병 진급 보정 (개월)</label>
                        <input type="number" id="mPfc2cpl" value="0">
                    </div>
                    <div class="form-group">
                        <label>상병 진급 보정 (개월)</label>
                        <input type="number" id="mCpl2sgt" value="0">
                    </div>
                    <div class="form-group full-width">
                        <label>프로필 사진 (드래그 & 드랍)</label>
                        <div id="photoDropZone" class="photo-drop-zone">
                            <img id="modalPhotoPreview" src="../img/default-profile.png" class="modal-photo-preview">
                            <p class="drop-zone-text">사진을 여기에 드래그하거나 클릭하여 선택</p>
                            <input type="file" id="mPhotoFile" accept="image/*" hidden>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-save">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../script.js"></script>
    <script src="personnelMattersInformation.js"></script>
</body>
</html>
