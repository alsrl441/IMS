<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사 정보</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="personnelMattersInformation.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <div class="nav-item">
                    <a href="../index.html" class="nav-link">대시보드</a>
                </div>
                
                <div class="nav-item">
                    <a href="#" class="nav-link">업무</a>
                    <div class="mega-menu">
                        <div class="mega-menu-container">
                            <div class="mega-menu-column">
                                <h3 class="mega-menu-title">선박 DB</h3>
                                <a href="../shipDB/identified/identified.html" class="mega-menu-item">식별 선박</a>
                                <a href="../shipDB/unidentified/unidentified.html" class="mega-menu-item">미식별 선박</a>
                            </div>
                            <div class="mega-menu-column">
                                <h3 class="mega-menu-title">선박 추적</h3>
                                <a href="../shipTrace/shipTrace.html" class="mega-menu-item">선박 추적 기록</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="nav-item">
                    <a href="#" class="nav-link active">비업무</a>
                    <div class="mega-menu">
                        <div class="mega-menu-container">
                            <div class="mega-menu-column">
                                <h3 class="mega-menu-title">인사 정보</h3>
                                <a href="personnelMattersInformation.html" class="mega-menu-item">인사 기록 관리</a>
                            </div>
                            <div class="mega-menu-column">
                                <h3 class="mega-menu-title">기타</h3>
                                <a href="../game/game.html" class="mega-menu-item game-link">놀이터</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="profile-layout">
            <section class="content-section">
                <div class="section-header">
                    <h2 class="section-title">인사 정보</h2>
                    <div class="d-flex align-items-center gap-2">
                        <div class="selector-wrapper">
                            <select id="memberSelect" class="form-select">
                                <option value="">인원 선택</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="section-body">
                    <div id="resultDisplay" class="result-content hidden">
                        <!-- Top Profile Section -->
                        <div class="profile-header-minimal mb-4">
                            <div class="profile-photo-area" id="photoEditArea">
                                <img id="resPhoto" src="../img/default-profile.png" alt="Profile" class="profile-photo-square">
                                <div id="photoOverlay" class="photo-overlay hidden">
                                    <i class="fas fa-camera"></i>
                                    <span>변경</span>
                                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                                </div>
                            </div>
                            <div class="profile-title-area">
                                <div class="nickname-edit-wrapper">
                                    <div id="resNickName" class="nickname-top view-mode"></div>
                                    <input type="text" id="editNickName" class="form-control-minimal edit-mode hidden" placeholder="별명">
                                </div>
                                <div class="progress-wrapper-minimal mt-2 view-mode">
                                    <div class="progress-bar-container-minimal">
                                        <div id="progressBarFill" class="progress-bar-fill-minimal"></div>
                                    </div>
                                    <div id="resPercent" class="percent-label-minimal"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Info Sections -->
                        <div class="profile-sections">
                            <!-- 기본 정보 -->
                            <div class="info-section">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="section-title mb-0"><i class="fas fa-user-circle"></i> 기본 정보</h6>
                                    <button id="addCustomFieldBtn" class="btn-minimal-xs edit-mode hidden"><i class="fas fa-plus"></i> 항목 추가</button>
                                </div>
                                <div class="info-grid-minimal" id="basicInfoGrid">
                                    <div class="info-row-minimal">
                                        <label>이름</label>
                                        <span id="resName" class="view-mode"></span>
                                        <input type="text" id="editName" class="form-control-minimal edit-mode hidden">
                                    </div>
                                    <div class="info-row-minimal">
                                        <label>소속</label>
                                        <span id="resAffiliation" class="view-mode"></span>
                                        <input type="text" id="editAffiliation" class="form-control-minimal edit-mode hidden">
                                    </div>
                                    <div class="info-row-minimal">
                                        <label>보직</label>
                                        <span id="resPosition" class="view-mode"></span>
                                        <input type="text" id="editPosition" class="form-control-minimal edit-mode hidden">
                                    </div>
                                    <!-- 커스텀 항목들이 여기에 추가됨 -->
                                </div>
                                <div id="customFieldsEditContainer" class="edit-mode hidden mt-2"></div>
                            </div>

                            <!-- 일정 정보 -->
                            <div class="info-section">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="section-title mb-0">일정</h6>
                                    <button id="addCustomScheduleBtn" class="btn-minimal-xs edit-mode hidden"><i class="fas fa-plus"></i> 일정 추가</button>
                                </div>
                                <div class="info-grid-minimal" id="scheduleInfoGrid">
                                    <!-- 1행: 입대 및 전입 -->
                                    <div class="info-row-minimal">
                                        <label>입대일</label>
                                        <span id="resStartDate" class="view-mode"></span>
                                        <input type="date" id="editStartDate" class="form-control-minimal edit-mode hidden">
                                    </div>
                                    <div class="info-row-minimal">
                                        <label id="labelTransfer">전입일</label>
                                        <span id="resTransferDate" class="view-mode"></span>
                                        <input type="date" id="editTransferDate" class="form-control-minimal edit-mode hidden">
                                    </div>
                                    
                                    <!-- 2행: 전역 관련 -->
                                    <div class="info-row-minimal highlight-dday">
                                        <label id="labelEnd">전역일자</label>
                                        <span id="resEndDateDate" class="view-mode"></span>
                                        <input type="date" id="editEndDate" class="form-control-minimal edit-mode hidden">
                                    </div>
                                    <div class="info-row-minimal highlight-dday view-mode">
                                        <label>전역</label>
                                        <span id="resDday"></span>
                                    </div>

                                    <!-- 3행: 진급 관련 -->
                                    <div class="info-row-minimal highlight-promotion view-mode">
                                        <label id="resPromoLabel">진급일</label>
                                        <span id="resPromoDate"></span>
                                    </div>
                                    <div class="info-row-minimal highlight-promotion view-mode">
                                        <label>진급</label>
                                        <span id="resPromoDday"></span>
                                    </div>

                                    <!-- 4행: 휴가 관련 -->
                                    <div class="info-row-minimal view-mode">
                                        <label id="resVacLabel">휴가일</label>
                                        <span id="resVacRange"></span>
                                    </div>
                                    <div class="info-row-minimal view-mode">
                                        <label>휴가</label>
                                        <span id="resVacDday"></span>
                                    </div>
                                    
                                    <!-- 진급 보정 (편집 모드에서만) -->
                                    <div class="info-row-minimal edit-mode hidden">
                                        <label>일병 > 상병 보정</label>
                                        <input type="number" id="editPfc2cpl" class="form-control-minimal" placeholder="조기 +1, 누락 -1">
                                    </div>
                                    <div class="info-row-minimal edit-mode hidden">
                                        <label>상병 > 병장 보정</label>
                                        <input type="number" id="editCpl2sgt" class="form-control-minimal" placeholder="조기 +1, 누락 -1">
                                    </div>
                                </div>
                                <div id="customSchedulesEditContainer" class="edit-mode hidden mt-2"></div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="profile-actions-footer mt-4">
                            <div class="view-mode">
                                <button id="editMemberBtn" class="btn-minimal-sm text-primary">수정</button>
                                <button id="deleteMemberBtn" class="btn-minimal-sm text-danger">삭제</button>
                            </div>
                            <div class="edit-mode hidden">
                                <button id="saveMemberBtn" class="btn-minimal-sm text-success">저장</button>
                                <button id="cancelEditBtn" class="btn-minimal-sm text-secondary">취소</button>
                            </div>
                        </div>
                    </div>

                    <div id="noDataMessage" class="text-center py-5 text-muted">
                    </div>
                </div>
            </section>

            <div id="previewDisplay" class="preview-grid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="personnelMattersInformation.js"></script>
</body>
</html>
