<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사 정보</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="personnel.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <div class="nav-item">
                    <a href="../index.html" class="nav-link">대시보드</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">업무</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link active">비업무</a>
                </div>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
            </div>
        </div>

        <div class="mega-menu">
            <div class="mega-menu-container">
                <div class="mega-menu-column">
                    <a href="../index.html" class="mega-menu-item">대시보드</a>
                </div>
                <div class="mega-menu-column">
                    <a href="../shipDB/identified/identified.html" class="mega-menu-item">식별 선박 DB</a>
                    <a href="../shipDB/unidentified/unidentified.html" class="mega-menu-item">미식별 선박 DB</a>
                    <a href="../shipTrace/shipTrace.html" class="mega-menu-item">선박 추적</a>
                </div>
                <div class="mega-menu-column">
                    <a href="personnel.html" class="mega-menu-item">인사 정보</a>
                    <a href="../game/game.html" class="mega-menu-item game-link">놀이터</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="section-header mb-4">
            <h2 class="section-title">인사 정보</h2>
            <div class="selector-wrapper">
                <select id="memberSelect" class="form-select" style="min-width: 200px;">
                    <option value="">인원 선택</option>
                </select>
            </div>
        </div>

        <div id="resultDisplay" class="profile-layout hidden">
            <!-- Left Side: Profile Card -->
            <aside class="profile-side-card">
                <div class="profile-photo-wrapper" id="photoEditArea">
                    <img id="resPhoto" src="../img/default-profile.png" alt="Profile" class="profile-photo-square">
                    <div id="photoOverlay" class="photo-overlay hidden">
                        <i class="fas fa-camera fa-lg mb-2"></i>
                        <span>사진 변경</span>
                        <input type="file" id="photoInput" accept="image/*" class="hidden">
                    </div>
                </div>

                <div class="main-info-area">
                    <div id="resNickName" class="res-name-big view-mode">별명</div>
                    <div id="resSubInfo" class="res-sub-info view-mode">소속 · 보직</div>
                    
                    <div class="edit-mode hidden">
                        <div class="edit-form-group">
                            <label>이름 (목록 표시용)</label>
                            <input type="text" id="editName" class="form-control-custom" placeholder="이름">
                        </div>
                        <div class="edit-form-group">
                            <label>별명 (상세 표시용)</label>
                            <input type="text" id="editNickName" class="form-control-custom" placeholder="별명">
                        </div>
                        <div class="edit-form-group">
                            <label>소속</label>
                            <input type="text" id="editAffiliation" class="form-control-custom" placeholder="소속">
                        </div>
                        <div class="edit-form-group">
                            <label>보직</label>
                            <input type="text" id="editPosition" class="form-control-custom" placeholder="보직">
                        </div>
                    </div>
                </div>

                <div class="progress-section-side view-mode">
                    <div class="progress-label-row">
                        <span class="progress-title">복무 진행률</span>
                        <span id="resPercent" class="progress-percent-val">0.00%</span>
                    </div>
                    <div class="progress-bar-container-side">
                        <div id="progressBarFill" class="progress-bar-fill-side" style="width: 0%"></div>
                    </div>
                </div>

                <div class="profile-actions mt-4">
                    <div class="view-mode w-100 d-flex gap-2">
                        <button id="editMemberBtn" class="btn-action btn-edit flex-grow-1">수정</button>
                        <button id="deleteMemberBtn" class="btn-action btn-delete">삭제</button>
                    </div>
                    <div class="edit-mode hidden w-100 d-flex gap-2">
                        <button id="saveMemberBtn" class="btn-action btn-save flex-grow-1">저장</button>
                        <button id="cancelEditBtn" class="btn-action btn-cancel">취소</button>
                    </div>
                </div>
            </aside>

            <!-- Right Side: Details -->
            <div class="profile-main-content">
                <!-- 복무 정보 (기존 주요 일정) -->
                <section class="detail-section">
                    <div class="detail-section-title">
                        복무 정보
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>입대일</label>
                            <span id="resStartDate" class="value view-mode">-</span>
                            <input type="date" id="editStartDate" class="form-control-custom edit-mode hidden">
                        </div>
                        <div class="info-item">
                            <label>전입일</label>
                            <span id="resTransferDate" class="value view-mode">-</span>
                            <input type="date" id="editTransferDate" class="form-control-custom edit-mode hidden">
                        </div>
                        <div class="info-item highlight">
                            <label>전역일</label>
                            <span id="resEndDateDate" class="value view-mode">-</span>
                            <input type="date" id="editEndDate" class="form-control-custom edit-mode hidden">
                        </div>
                        <div class="info-item highlight view-mode">
                            <label>전역</label>
                            <span id="resDday" class="value">-</span>
                        </div>
                    </div>
                </section>

                <!-- 진급 및 휴가 -->
                <section class="detail-section">
                    <div class="detail-section-title">
                        진급 및 휴가
                    </div>
                    <div class="info-grid">
                        <div class="info-item view-mode">
                            <label id="resPromoLabel">다음 진급일</label>
                            <span id="resPromoDate" class="value">-</span>
                        </div>
                        <div class="info-item view-mode">
                            <label>진급</label>
                            <span id="resPromoDday" class="value">-</span>
                        </div>
                        <div class="info-item view-mode">
                            <label>휴가 기간</label>
                            <span id="resVacRange" class="value">-</span>
                        </div>
                        <div class="info-item view-mode">
                            <label>휴가</label>
                            <span id="resVacDday" class="value">-</span>
                        </div>

                        <!-- 편집 모드 -->
                        <div class="info-item edit-mode hidden">
                            <label>일병 > 상병 보정</label>
                            <input type="number" id="editPfc2cpl" class="form-control-custom" placeholder="조기/누락">
                        </div>
                        <div class="info-item edit-mode hidden">
                            <label>상병 > 병장 보정</label>
                            <input type="number" id="editCpl2sgt" class="form-control-custom" placeholder="조기/누락">
                        </div>
                        <div class="info-item edit-mode hidden">
                            <label>휴가 시작일</label>
                            <input type="date" id="editVacStart" class="form-control-custom">
                        </div>
                        <div class="info-item edit-mode hidden">
                            <label>휴가 종료일</label>
                            <input type="date" id="editVacEnd" class="form-control-custom">
                        </div>
                    </div>
                </section>

                <!-- 추가 일정 (신설) -->
                <section class="detail-section">
                    <div class="detail-section-title">
                        추가 일정
                        <button id="addCustomScheduleBtn" class="btn-minimal-xs edit-mode hidden ms-auto" style="border:none; background:none; color:#adb5bd;">추가</button>
                    </div>
                    <div class="info-grid" id="scheduleInfoGrid">
                        <!-- 추가 일정들이 여기에 추가됨 -->
                    </div>
                    <div id="customSchedulesEditContainer" class="edit-mode hidden mt-3"></div>
                </section>

                <!-- 추가 정보 -->
                <section class="detail-section">
                    <div class="detail-section-title">
                        추가 정보
                        <button id="addCustomFieldBtn" class="btn-minimal-xs edit-mode hidden ms-auto" style="border:none; background:none; color:#adb5bd;">추가</button>
                    </div>
                    <div class="info-grid" id="basicInfoGrid">
                        <!-- 커스텀 항목들이 여기에 추가됨 -->
                    </div>
                    <div id="customFieldsEditContainer" class="edit-mode hidden mt-2"></div>
                </section>
            </div>
        </div>

        <div id="noDataMessage" class="text-center py-5">
            <!-- 비어있을 때 표시될 내용 -->
        </div>

        <div id="previewDisplay" class="preview-grid"></div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="personnel.js"></script>
</body>
</html>
