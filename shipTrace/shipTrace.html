<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선박 추적</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="shipTrace.css">
</head>
<body class="trace-body">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <div class="nav-item-dropdown">
                    <a href="#" class="nav-link">선박 DB</a>
                    <div class="dropdown-menu">
                        <a href="../shipDB/identified/identified.html" class="dropdown-item">식별 선박</a>
                        <a href="../shipDB/unidentified/unidentified.html" class="dropdown-item">미식별 선박</a>
                    </div>
                </div>
                <a href="shipTrace.html" class="nav-link active">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="trace-container py-4">
        <div class="trace-card">
            <div class="trace-header">
                <div class="header-title">
                    <h5>선박 추적</h5>
                </div>
                <div class="mode-tabs">
                    <input type="radio" id="mode-direct" name="trace-mode" value="direct" checked>
                    <label for="mode-direct" class="mode-tab">직접 식별</label>
                    <input type="radio" id="mode-inquiry" name="trace-mode" value="inquiry">
                    <label for="mode-inquiry" class="mode-tab">문의로 식별</label>
                </div>
                <button type="button" class="btn-reset" onclick="resetForm()">
                    <span class="icon-rotate">&orarr;</span> 초기화
                </button>
            </div>

            <form id="trace-form" class="trace-form">
                <div id="section-inquiry" class="mode-section" style="display: none;">
                    <div class="form-group-section">
                        <h6 class="section-label">레이더 기지 문의 정보</h6>
                        <div class="grid-layout">
                            <div class="input-field">
                                <label>좌표</label>
                                <input type="text" id="coord-input" size="7" placeholder="000 000">
                            </div>
                            <div class="input-field">
                                <label>추적 번호</label>
                                <div class="input-group">
                                    <select id="radar-station-select">
                                        <option value="-">-</option>
                                        <option value="145">145</option>
                                        <option value="146">146</option>
                                    </select>
                                    <input type="text" id="trace-num" size="3" placeholder="번호">
                                </div>
                            </div>
                            <div class="input-field">
                                <label>이동방향</label>
                                <input type="text" id="current-move-dir" list="dir-options" size="3" placeholder="이동방향">
                            </div>
                            <div class="input-field">
                                <label>거리</label>
                                <div class="input-group">
                                    <input type="number" id="dist-value" step="0.1" style="width: 80px;" placeholder="거리">
                                    <select id="dist-unit">
                                        <option value="NM">NM</option>
                                        <option value="M">M</option>
                                        <option value="km">km</option>
                                    </select>
                                    <span id="dist-km-display" class="km-badge">-- km</span>
                                </div>
                            </div>
                            <div class="input-field">
                                <label>출항지</label>
                                <input type="text" id="departure" size="12" placeholder="출항지">
                            </div>
                            <div class="input-field">
                                <label>수화자</label>
                                <input type="text" id="telephonee" size="8" placeholder="관등성명">
                            </div>
                        </div>
                    </div>
                    <div class="form-group-section">
                        <h6 class="section-label">레이더 기지 인수인계 내용</h6>
                        <textarea id="handover-details" rows="2" placeholder="수화자에게 인수받은 내용 및 인계한 내용."></textarea>
                    </div>
                </div>

                <div id="section-common" class="mode-section">
                    <div class="form-group-section">
                        <h6 class="section-label">선박 식별 정보 및 제원</h6>
                        <div class="grid-layout cols-3">
                            <div class="input-field">
                                <label>식별 카메라</label>
                                <select id="camera-num">
                                    <option value="소롱산 CCTV" selected>소롱산 CCTV</option>
                                    <option value="면전해변 CCTV">면전해변 CCTV</option>
                                    <option value="송공항 CCTV">송공항 CCTV</option>
                                    <option value="추포항 CCTV">추포항 CCTV</option>
                                    <option value="외우목도 CCTV">외우목도 CCTV</option>
                                </select>
                            </div>
                            <div class="input-field">
                                <label>선명</label>
                                <input type="text" id="ship-name" size="15" placeholder="선명">
                            </div>
                            <div class="input-field">
                                <label>선종</label>
                                <input type="text" id="ship-type" size="12" placeholder="선종">
                            </div>
                            <div class="input-field">
                                <label>톤수</label>
                                <input type="text" id="ship-tonnage" size="5" placeholder="톤수">
                            </div>
                            <div class="input-field">
                                <label>어선 번호</label>
                                <input type="text" id="ship-number" size="15" placeholder="어선 번호">
                            </div>
                            <div class="input-field">
                                <label>인원</label>
                                <input type="text" id="crew-count" size="5" placeholder="식별 인원수">
                            </div>
                            <div class="input-field">
                                <label>선주</label>
                                <input type="text" id="ship-owner" size="10" placeholder="선주명">
                            </div>
                            <div class="input-field">
                                <label>전화번호</label>
                                <input type="text" id="ship-tel" size="15" placeholder="전화번호">
                            </div>
                            <div class="input-field">
                                <label>근무자</label>
                                <input type="text" id="worker" size="10" placeholder="관등성명">
                            </div>
                        </div>
                    </div>

                    <div class="form-group-section highlight">
                        <h6 class="section-label">식별 시간 및 위치</h6>
                        <div class="grid-layout cols-2">
                            <div class="time-record-box">
                                <div class="box-header">최초 식별</div>
                                <div class="box-content">
                                    <div class="inner-row">
                                        <label>시간</label>
                                        <div class="input-group">
                                            <input type="text" id="first-time" size="5" maxlength="5" placeholder="00:00">
                                            <button type="button" class="btn-now" onclick="setCurrentTime('first-time')">현재 시간</button>
                                        </div>
                                    </div>
                                    <div class="inner-row">
                                        <label>방위각/고각</label>
                                        <input type="text" id="first-az-el" size="10" placeholder="방위각 고각">
                                    </div>
                                    <div class="inner-row">
                                        <label>최초 식별 위치</label>
                                        <input type="text" id="first-pos" size="20" placeholder="식별 위치">
                                    </div>
                                </div>
                            </div>
                            <div class="time-record-box">
                                <div class="box-header">최종 식별</div>
                                <div class="box-content">
                                    <div class="inner-row">
                                        <label>시간</label>
                                        <div class="input-group">
                                            <input type="text" id="last-time" size="5" maxlength="5" placeholder="00:00">
                                            <button type="button" class="btn-now" onclick="setCurrentTime('last-time')">현재 시간</button>
                                        </div>
                                    </div>
                                    <div class="inner-row">
                                        <label>방위각/고각</label>
                                        <input type="text" id="last-az-el" size="10" placeholder="0000 00">
                                    </div>
                                    <div class="inner-row">
                                        <label>최종 식별 위치</label>
                                        <input type="text" id="last-pos" size="20" placeholder="식별 위치">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group-section">
                        <h6 class="section-label">이동 경로</h6>
                        <div class="grid-layout">
                            <div class="input-field">
                                <label>이동 방향</label>
                                <input type="text" id="move-dir-common" list="dir-options" size="10" placeholder="이동 방향">
                                <datalist id="dir-options">
                                    <option>동진</option><option>서진</option><option>남진</option><option>북진</option>
                                    <option>북동진</option><option>남동진</option><option>남서진</option><option>북서진</option>
                                </datalist>
                            </div>
                            <div class="input-field">
                                <label>추적 종료 사유</label>
                                <select id="termination-reason">
                                    <option value="소실">소실</option>
                                    <option value="입항">입항</option>
                                    <option value="정박">정박</option>
                                    <option value="정상 활동">정상 활동</option>
                                    <option value="타 선박 문의">타 선박 문의</option>
                                </select>
                            </div>
                        </div>
                        <div class="path-preview" style="margin-top: 15px; font-size: 0.9rem; color: var(--text-main);">
                            이동 경로: <span id="path-preview-text"></span>
                        </div>
                    </div>

                    <div class="form-group-section">
                        <div class="input-field full-width">
                            <label>외부명칭 / 깃발</label>
                            <input type="text" id="external-name" placeholder="외부 명칭 / 깃발">
                        </div>
                    </div>

                    <div class="form-group-section">
                        <h6 class="section-label">선체 특징</h6>
                        <textarea id="tags" rows="2" placeholder="선수 ㅇㅇ, 선미 ㅁㅁ, ..."></textarea>
                    </div>

                    <div class="form-group-section">
                        <h6 class="section-label">이미지</h6>
                        <div class="grid-layout cols-2">
                            <div class="image-upload-box" id="ship-image-zone">
                                <label>선박 이미지</label>
                                <div class="drop-zone" id="ship-drop-zone">
                                    <img id="ship-preview" src="" class="preview-img">
                                </div>
                            </div>
                            <div class="image-upload-box" id="path-image-zone">
                                <label>항로 이미지</label>
                                <div class="drop-zone" id="path-drop-zone">
                                    <img id="path-preview" src="" class="preview-img">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group-section">
                        <div class="input-field full-width">
                            <label>어선법 위반 여부</label>
                            <div class="violation-wrapper">
                                <select id="violation-select" onchange="toggleViolationDetail()">
                                    <option value="X" selected>X</option>
                                    <option value="O">O</option>
                                </select>
                                <input type="text" id="violation-detail" size="40" placeholder="위반 내용" disabled style="flex: 1;">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-submit" onclick="saveTraceLog()">
                        저장
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="shipTrace.js"></script>
</body>
</html>
