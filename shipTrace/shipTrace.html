<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선박 추적 - 실시간 기록지</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="shipTrace.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <a href="../shipSearch/shipSearch.html" class="nav-link">선박 찾기</a>
                <a href="shipTrace.html" class="nav-link active">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="card-title" style="margin:0; font-weight: bold;">선박 추적 실시간 기록지</h5>
                <button class="btn-outline" onclick="resetForm()">초기화</button>
            </div>
            <div class="card-body">
                <form id="trace-form">
                    <div class="form-section">
                        <!-- Line 1: 좌표, 추적번호 -->
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>좌표</label>
                                <input type="text" id="coord-input" class="form-control-sm" placeholder="6계단">
                                <div id="full-coord" class="coord-display">52SBD ----- -----</div>
                            </div>
                            <div class="form-group flex-1">
                                <label>추적 번호</label>
                                <div class="trace-num-group">
                                    <select id="radar-station-select" class="form-control-sm">
                                        <option value="-">-</option>
                                        <option value="145">145</option>
                                        <option value="146">146</option>
                                    </select>
                                    <input type="text" id="trace-num" placeholder="번호" class="form-control-sm">
                                </div>
                            </div>
                        </div>

                        <!-- Line 2: 이동방향, 거리 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>이동방향 <span class="required">*</span></label>
                                <input type="text" id="move-dir" list="dir-options" class="form-control-sm" required>
                                <datalist id="dir-options">
                                    <option>동진</option><option>서진</option><option>남진</option><option>북진</option>
                                    <option>북동진</option><option>남동진</option><option>남서진</option><option>북서진</option>
                                </datalist>
                            </div>
                            <div class="form-group flex-1">
                                <label>거리 <span class="required">*</span></label>
                                <div class="dist-input-group">
                                    <input type="number" id="dist-value" step="0.1" class="form-control-sm" required style="width: 100px;">
                                    <select id="dist-unit" class="form-control-sm">
                                        <option value="NM">NM</option>
                                        <option value="M">M</option>
                                        <option value="km">km</option>
                                    </select>
                                    <div id="dist-km-display" class="dist-box ml-2">-- km</div>
                                </div>
                            </div>
                        </div>

                        <!-- Line 3: 출항지, 수화자 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>출항지 <span class="required">*</span></label>
                                <input type="text" id="departure" class="form-control-sm" required>
                            </div>
                            <div class="form-group flex-1">
                                <label>수화자 관등성명</label>
                                <input type="text" id="telephonee" class="form-control-sm" placeholder="-">
                            </div>
                        </div>

                        <!-- Line 4: 최초 식별 시간, 최종 식별 시간 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>최초 식별 시간 <span class="required">*</span></label>
                                <div class="time-input-group">
                                    <input type="time" id="first-time" class="form-control-sm" required>
                                    <button type="button" class="btn-now" onclick="setCurrentTime('first-time')">현재</button>
                                </div>
                            </div>
                            <div class="form-group flex-1">
                                <label>최종 식별 시간 <span class="required">*</span></label>
                                <div class="time-input-group">
                                    <input type="time" id="last-time" class="form-control-sm" required>
                                    <button type="button" class="btn-now" onclick="setCurrentTime('last-time')">현재</button>
                                </div>
                            </div>
                        </div>

                        <!-- Line 5: 최초 식별 방위각 고각, 최종 식별 방위각 고각 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>최초 식별 방위각 고각 <span class="required">*</span></label>
                                <input type="text" id="first-az-el" class="form-control-sm" required>
                            </div>
                            <div class="form-group flex-1">
                                <label>최종 식별 방위각 고각 <span class="required">*</span></label>
                                <input type="text" id="last-az-el" class="form-control-sm" required>
                            </div>
                        </div>

                        <!-- Line 6: 최초 식별 위치, 최종 식별 위치 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>최초 식별 위치 <span class="required">*</span></label>
                                <input type="text" id="first-pos" class="form-control-sm" required>
                            </div>
                            <div class="form-group flex-1">
                                <label>최종 식별 위치 <span class="required">*</span></label>
                                <input type="text" id="last-pos" class="form-control-sm" required>
                            </div>
                        </div>

                        <!-- Line 7: 선명, 톤수 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>선명</label>
                                <input type="text" id="ship-name" class="form-control-sm" placeholder="식별불가">
                            </div>
                            <div class="form-group flex-1">
                                <label>톤수</label>
                                <input type="text" id="ship-tonnage" class="form-control-sm" placeholder="식별불가">
                            </div>
                        </div>

                        <!-- Line 8: 선종, 인원 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>선종</label>
                                <input type="text" id="ship-type" class="form-control-sm" placeholder="식별불가">
                            </div>
                            <div class="form-group flex-1">
                                <label>인원 수</label>
                                <input type="text" id="crew-count" class="form-control-sm" placeholder="식별불가">
                            </div>
                        </div>

                        <!-- Line 9: 어선법 위반 여부, 근무자 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>어선법 위반 여부</label>
                                <div class="d-flex align-items-center" style="gap: 10px;">
                                    <div class="violation-check-group">
                                        <input type="checkbox" id="violation-check" onchange="toggleViolationDetail()">
                                        <label for="violation-check">O</label>
                                    </div>
                                    <input type="text" id="violation-detail" class="form-control-sm" placeholder="위반 내용" disabled style="flex: 1;">
                                </div>
                            </div>
                            <div class="form-group flex-1">
                                <label>근무자 관등성명 <span class="required">*</span></label>
                                <input type="text" id="worker" class="form-control-sm" required>
                            </div>
                        </div>

                        <!-- Line 10: 특이사항 -->
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>특이사항</label>
                                <input type="text" id="tags" class="form-control-sm" placeholder="">
                            </div>
                        </div>
                    </div>

                    <div class="form-footer mt-4">
                        <button type="button" class="btn-primary" onclick="saveTraceLog()" style="width: 250px;">최종 추적 기록 저장 (DB 등록)</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="btn-group">
                <a href="../databaseManager/databaseManager.html" target="_blank" class="btn-outline">DBM</a>
                <a href="#" target="_blank" class="btn-outline">국방인사정보체계</a>
                <a href="#" target="_blank" class="btn-outline">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="shipTrace.js"></script>
</body>
</html>
