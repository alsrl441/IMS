<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선박 추적 - 실시간 기록지</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="shipTrace.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <a href="../shipSearch/shipSearch.html" class="nav-link">선박 찾기</a>
                <a href="shipTrace.html" class="nav-link active">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="card-title" style="margin:0; font-weight: bold;">선박 추적 실시간 기록지</h5>
                <button class="btn-outline" onclick="resetForm()">초기화</button>
            </div>
            <div class="card-body">
                <form id="trace-form">
                    <!-- 1~2단계: 문의 정보 -->
                    <div class="form-section">
                        <h6>1. 문의 정보 (수화 및 기초 데이터)</h6>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>수화자 관등성명</label>
                                <input type="text" id="telephonee" class="form-control-sm" placeholder="예: 중사 홍길동">
                            </div>
                            <div class="form-group flex-2">
                                <label>문의 좌표 (6계단)</label>
                                <input type="text" id="coord-input" placeholder="123 456" class="form-control-sm">
                                <div id="full-coord" class="coord-display">52SBD ----- -----</div>
                            </div>
                            <div class="form-group flex-1">
                                <label>이동 방향 (direction)</label>
                                <input type="text" id="move-dir" list="dir-options" placeholder="입력/선택" class="form-control-sm">
                                <datalist id="dir-options">
                                    <option>동진</option><option>서진</option><option>남진</option><option>북진</option>
                                    <option>북동진</option><option>남동진</option><option>남서진</option><option>북서진</option>
                                </datalist>
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-2">
                                <label>거리 (distance, 입력: NM/M → 저장: km)</label>
                                <div class="dist-input-group">
                                    <input type="number" id="dist-value" step="0.1" placeholder="값" class="form-control-sm" style="width: 80px;">
                                    <select id="dist-unit" class="form-control-sm">
                                        <option value="NM">NM</option>
                                        <option value="M">M</option>
                                        <option value="km">km</option>
                                    </select>
                                    <div class="dist-multi-display">
                                        <div id="dist-km-display" class="dist-box" title="DB에 저장될 km 값">-- km</div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group flex-1">
                                <label>추적 번호 (traceNumber)</label>
                                <div class="trace-num-group">
                                    <select id="radar-station-select" class="form-control-sm">
                                        <option value="-">직접 식별(-)</option>
                                        <option value="145">145</option>
                                        <option value="146">146</option>
                                    </select>
                                    <input type="text" id="trace-num" placeholder="번호" class="form-control-sm">
                                </div>
                            </div>
                            <div class="form-group flex-1">
                                <label>최초 출항지 (firstOutport)</label>
                                <input type="text" id="departure" placeholder="출항지" class="form-control-sm">
                            </div>
                        </div>
                    </div>

                    <!-- 4단계: 식별 정보 -->
                    <div class="form-section">
                        <h6>2. 식별 정보 (카메라 포착 시)</h6>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>최초 식별 시간</label>
                                <div class="time-input-group">
                                    <input type="time" id="first-time" class="form-control-sm">
                                    <button type="button" class="btn-now" onclick="setCurrentTime('first-time')">현재</button>
                                </div>
                            </div>
                            <div class="form-group flex-2">
                                <label>최초 식별 위치 (상세)</label>
                                <input type="text" id="first-pos" class="form-control-sm" placeholder="예: 격렬비열도 북방 2마일">
                            </div>
                            <div class="form-group flex-1">
                                <label>최초 방위각/고각</label>
                                <input type="text" id="first-az-el" class="form-control-sm" placeholder="예: 120 / -5">
                            </div>
                        </div>
                    </div>

                    <!-- 5~6단계: 추적 종료 -->
                    <div class="form-section">
                        <h6>3. 추적 종료</h6>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>최종 종료 시간</label>
                                <div class="time-input-group">
                                    <input type="time" id="last-time" class="form-control-sm">
                                    <button type="button" class="btn-now" onclick="setCurrentTime('last-time')">현재</button>
                                </div>
                            </div>
                            <div class="form-group flex-2">
                                <label>최종 종료 위치</label>
                                <input type="text" id="last-pos" class="form-control-sm" placeholder="최종 위치">
                            </div>
                            <div class="form-group flex-1">
                                <label>최종 방위각/고각</label>
                                <input type="text" id="last-az-el" class="form-control-sm" placeholder="예: 150 / 0">
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>종료 사유/상태</label>
                                <select id="end-status" class="form-control-sm">
                                    <option value="소실">소실 (사각구역/원해)</option>
                                    <option value="입항">입항</option>
                                    <option value="정박">해상 정박</option>
                                    <option value="정상 활동">정상 활동 (문의 종료)</option>
                                    <option value="타 문의 전환">타 문의 전환 (긴급)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 7~8단계: 복기 및 최종 DB 등록 -->
                    <div class="form-section" style="background-color: #f0f7ff; border: 1px solid #b8daff;">
                        <h6>4. 복기 및 마무리 (영상 분석 후 작성)</h6>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>선명</label>
                                <input type="text" id="ship-name" class="form-control-sm" required placeholder="선박 이름">
                            </div>
                            <div class="form-group flex-1">
                                <label>톤수</label>
                                <input type="text" id="ship-tonnage" class="form-control-sm" placeholder="예: 4.99톤">
                            </div>
                            <div class="form-group flex-1">
                                <label>선종</label>
                                <input type="text" id="ship-type" class="form-control-sm" placeholder="예: 연안통발">
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>인원 수</label>
                                <input type="text" id="crew-count" class="form-control-sm" placeholder="예: 3, 식별불가">
                            </div>
                            <div class="form-group flex-1">
                                <label>어선법 위반 여부</label>
                                <select id="violation" class="form-control-sm">
                                    <option value="무">해당 없음 (무)</option>
                                    <option value="위반">위반 식별</option>
                                    <option value="확인불가">확인 불가</option>
                                </select>
                            </div>
                            <div class="form-group flex-1">
                                <label>근무자 관등성명</label>
                                <input type="text" id="worker" class="form-control-sm" placeholder="예: 병장 이순신">
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>기타 특이사항 (태그용)</label>
                                <input type="text" id="tags" class="form-control-sm" placeholder="쉼표로 구분 (예: 백색 선체, 레이더 장착)">
                            </div>
                        </div>
                    </div>

                    <div class="form-footer mt-4">
                        <button type="button" class="btn-primary" onclick="saveTraceLog()" style="width: 250px;">최종 추적 기록 저장 (DB 등록)</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="btn-group">
                <a href="../databaseManager/databaseManager.html" target="_blank" class="btn-outline">DBM</a>
                <a href="#" target="_blank" class="btn-outline">국방인사정보체계</a>
                <a href="#" target="_blank" class="btn-outline">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="shipTrace.js"></script>
</body>
</html>
