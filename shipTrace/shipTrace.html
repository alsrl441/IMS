<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선박 추적</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="shipTrace.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <a href="../shipSearch/shipSearch.html" class="nav-link">선박 찾기</a>
                <a href="shipTrace.html" class="nav-link active">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="card-title" style="margin:0; font-weight: bold;">선박 추적 기록지</h5>
                <button class="btn-outline" onclick="resetForm()">초기화</button>
            </div>
            <div class="card-body">
                <form id="trace-form">
                    <!-- 문의 정보 섹션 복구 -->
                    <div class="form-section">
                        <h6>1. 위치 및 문의 정보 (메모용)</h6>
                        <div class="form-row">
                            <div class="form-group flex-2">
                                <label>좌표 (6계단)</label>
                                <input type="text" id="coord-input" placeholder="123 456" class="form-control-sm">
                                <div id="full-coord" class="coord-display">52SBD ----- -----</div>
                            </div>
                            <div class="form-group flex-1">
                                <label>이동 방향</label>
                                <input type="text" id="move-dir" list="dir-options" placeholder="입력/선택" class="form-control-sm">
                                <datalist id="dir-options">
                                    <option>동진</option><option>서진</option><option>남진</option><option>북진</option>
                                    <option>북동진</option><option>남동진</option><option>남서진</option><option>북서진</option>
                                </datalist>
                            </div>
                            <div class="form-group flex-2">
                                <label>거리</label>
                                <div class="dist-input-group">
                                    <input type="number" id="dist-value" step="0.1" placeholder="값" class="form-control-sm" style="width: 60px;">
                                    <select id="dist-unit" class="form-control-sm">
                                        <option value="NM">NM</option>
                                        <option value="km">km</option>
                                        <option value="M">M</option>
                                    </select>
                                    <div class="dist-multi-display">
                                        <div id="dist-conv-1" class="dist-box">--</div>
                                        <div id="dist-conv-2" class="dist-box">--</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>추적 번호</label>
                                <div class="trace-num-group">
                                    <select id="radar-site" class="form-control-sm">
                                        <option value="145">145</option>
                                        <option value="146">146</option>
                                    </select>
                                    <input type="text" id="trace-num" placeholder="번호" class="form-control-sm">
                                </div>
                            </div>
                            <div class="form-group flex-1">
                                <label>최초 출항지</label>
                                <input type="text" id="departure" placeholder="출항지" class="form-control-sm">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h6>2. 선박 기본 정보</h6>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>선명</label>
                                <input type="text" id="ship-name" class="form-control-sm" required placeholder="선박 이름">
                            </div>
                            <div class="form-group flex-1">
                                <label>톤수</label>
                                <input type="text" id="ship-tonnage" class="form-control-sm" placeholder="예: 4.99톤">
                            </div>
                            <div class="form-group flex-1">
                                <label>선종</label>
                                <input type="text" id="ship-type" class="form-control-sm" placeholder="예: 연안통발">
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>어선 번호</label>
                                <input type="text" id="vessel-num" class="form-control-sm" placeholder="어선 번호 입력">
                            </div>
                            <div class="form-group flex-1">
                                <label>연락처</label>
                                <input type="text" id="contact" class="form-control-sm" placeholder="연락처">
                            </div>
                            <div class="form-group flex-2">
                                <label>기타/외형적 특이사항 (태그)</label>
                                <input type="text" id="tags" class="form-control-sm" placeholder="쉼표로 구분 (예: 백색 선체, 레이더 장착)">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h6>3. 식별 기록</h6>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>식별 날짜</label>
                                <input type="date" id="id-date" class="form-control-sm">
                            </div>
                            <div class="form-group flex-1">
                                <label>인원 수</label>
                                <input type="text" id="crew-count" class="form-control-sm" placeholder="예: 2, 식별불가">
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>최초 식별 시간</label>
                                <div class="time-input-group">
                                    <input type="time" id="first-time" class="form-control-sm">
                                    <button type="button" class="btn-now" onclick="setCurrentTime('first-time')">현재</button>
                                </div>
                            </div>
                            <div class="form-group flex-2">
                                <label>최초 식별 위치</label>
                                <input type="text" id="first-pos" class="form-control-sm" placeholder="최초 위치">
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-1">
                                <label>최종 식별 시간</label>
                                <div class="time-input-group">
                                    <input type="time" id="last-time" class="form-control-sm">
                                    <button type="button" class="btn-now" onclick="setCurrentTime('last-time')">현재</button>
                                </div>
                            </div>
                            <div class="form-group flex-2">
                                <label>최종 식별 위치</label>
                                <input type="text" id="last-pos" class="form-control-sm" placeholder="최종 위치">
                            </div>
                        </div>
                        <div class="form-row mt-3">
                            <div class="form-group flex-2">
                                <label>인수인계 내용</label>
                                <div class="handover-presets">
                                    <button type="button" class="btn-preset" onclick="setHandover('145R/S에서 인수받은 선박')">145R/S</button>
                                    <button type="button" class="btn-preset" onclick="setHandover('146R/S에서 인수받은 선박')">146R/S</button>
                                    <button type="button" class="btn-preset" onclick="setHandover('-')">직접식별(-)</button>
                                </div>
                                <textarea id="handover" rows="3" class="form-control-sm" style="width: 100%; height: auto;"></textarea>
                            </div>
                            <div class="form-group flex-1">
                                <label>근무자 관등성명</label>
                                <input type="text" id="worker" class="form-control-sm" placeholder="근무자">
                                <label class="mt-2">수화자 관등성명</label>
                                <input type="text" id="telephonee" class="form-control-sm" placeholder="수화자">
                            </div>
                        </div>
                    </div>

                    <div class="form-footer mt-4">
                        <button type="button" class="btn-primary" onclick="saveTraceLog()" style="width: 200px;">추적 기록 저장</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mt-4 shadow-sm" style="max-width: 100%; overflow-x: auto;">
            <div class="card-header bg-white">
                <h5 class="card-title" style="margin:0; font-weight: bold;">최근 식별 기록 (종합)</h5>
            </div>
            <div class="card-body p-0">
                <table class="table trace-table">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>선명 (톤수/선종)</th>
                            <th>최초 식별</th>
                            <th>최종 식별</th>
                            <th>인원</th>
                            <th>인수인계</th>
                            <th>근무자/수화자</th>
                        </tr>
                    </thead>
                    <tbody id="log-list">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="btn-group">
                <a href="../databaseManager/databaseManager.html" target="_blank" class="btn-outline">DBM</a>
                <a href="#" target="_blank" class="btn-outline">국방인사정보체계</a>
                <a href="#" target="_blank" class="btn-outline">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="shipTrace.js"></script>
</body>
</html>
