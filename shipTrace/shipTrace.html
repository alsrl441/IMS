<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선박 추적</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="shipTrace.css">
</head>
<body class="trace-body">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <a href="../shipSearch/shipSearch.html" class="nav-link">선박 찾기</a>
                <a href="shipTrace.html" class="nav-link active">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="trace-container py-4">
        <div class="trace-card">
            <div class="trace-header">
                <div class="header-title">
                    <h5>선박 추적</h5>
                </div>
                <button type="button" class="btn-reset" onclick="resetForm()">
                    <span class="icon-rotate">↻</span> 초기화
                </button>
            </div>

            <form id="trace-form" class="trace-form">
                <div class="form-group-section">
                    <h6 class="section-label">문의 정보</h6>
                    <div class="grid-layout">
                        <div class="input-field">
                            <label>문의 좌표</label>
                            <input type="text" id="coord-input" size="7" placeholder="좌표">
                        </div>
                        <div class="input-field">
                            <label>추적 번호</label>
                            <div class="input-group">
                                <select id="radar-station-select">
                                    <option value="-">-</option>
                                    <option value="145">145</option>
                                    <option value="146">146</option>
                                </select>
                                <input type="text" id="trace-num" size="3" placeholder="번호">
                            </div>
                        </div>
                        <div class="input-field">
                            <label>이동방향</label>
                            <input type="text" id="move-dir" list="dir-options" size="3" placeholder="이동방향 선택/입력">
                            <datalist id="dir-options">
                                <option>동진</option><option>서진</option><option>남진</option><option>북진</option>
                                <option>북동진</option><option>남동진</option><option>남서진</option><option>북서진</option>
                            </datalist>
                        </div>
                        <div class="input-field">
                            <label>거리</label>
                            <div class="input-group">
                                <input type="number" id="dist-value" step="0.1" style="width: 80px;" placeholder="거리">
                                <select id="dist-unit">
                                    <option value="NM">NM</option>
                                    <option value="M">M</option>
                                    <option value="km">km</option>
                                </select>
                                <span id="dist-km-display" class="km-badge">km</span>
                            </div>
                        </div>
                        <div class="input-field">
                            <label>출항지</label>
                            <input type="text" id="departure" size="12" placeholder="출항지">
                        </div>
                        <div class="input-field">
                            <label>수화자</label>
                            <input type="text" id="telephonee" size="8" placeholder="수화자 관등성명">
                        </div>
                    </div>
                </div>

                <div class="form-group-section highlight">
                    <h6 class="section-label">식별 시간 및 위치</h6>
                    <div class="grid-layout cols-2">
                        <div class="time-record-box">
                            <div class="box-header">최초 식별</div>
                            <div class="box-content">
                                <div class="inner-row">
                                    <label>시간 <span class="required">*</span></label>
                                    <div class="input-group">
                                        <input type="text" id="first-time" size="5" maxlength="5" placeholder="00:00" required>
                                        <button type="button" class="btn-now" onclick="setCurrentTime('first-time')">현재 시간 입력</button>
                                    </div>
                                </div>
                                <div class="inner-row">
                                    <label>방위각 고각 <span class="required">*</span></label>
                                    <input type="text" id="first-az-el" size="10" required placeholder="0000 00">
                                </div>
                                <div class="inner-row">
                                    <label>위치 <span class="required">*</span></label>
                                    <input type="text" id="first-pos" size="20" required placeholder="식별 위치">
                                </div>
                            </div>
                        </div>
                        <div class="time-record-box">
                            <div class="box-header">최종 식별</div>
                            <div class="box-content">
                                <div class="inner-row">
                                    <label>시간 <span class="required">*</span></label>
                                    <div class="input-group">
                                        <input type="text" id="last-time" size="5" maxlength="5" placeholder="00:00" required>
                                        <button type="button" class="btn-now" onclick="setCurrentTime('last-time')">현재 시간 입력</button>
                                    </div>
                                </div>
                                <div class="inner-row">
                                    <label>방위각 고각 <span class="required">*</span></label>
                                    <input type="text" id="last-az-el" size="10" required placeholder="0000 00">
                                </div>
                                <div class="inner-row">
                                    <label>위치 <span class="required">*</span></label>
                                    <input type="text" id="last-pos" size="20" required placeholder="소실 위치">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group-section">
                    <h6 class="section-label">선박 제원</h6>
                    <div class="grid-layout">
                        <div class="input-field">
                            <label>선명</label>
                            <input type="text" id="ship-name" size="15" placeholder="예) 아라호">
                        </div>
                        <div class="input-field">
                            <label>톤수</label>
                            <input type="text" id="ship-tonnage" size="5" placeholder="예) 1t">
                        </div>
                        <div class="input-field">
                            <label>선종</label>
                            <input type="text" id="ship-type" size="12" placeholder="예) 선외기">
                        </div>
                        <div class="input-field">
                            <label>인원</label>
                            <input type="text" id="crew-count" size="5" placeholder="예) 1">
                        </div>
                        <div class="input-field span-2">
                            <label>어선법 위반 여부</label>
                            <div class="violation-wrapper">
                                <select id="violation-select" onchange="toggleViolationDetail()">
                                    <option value="X" selected>X</option>
                                    <option value="O">O</option>
                                </select>
                                <input type="text" id="violation-detail" size="25" placeholder="위반 내용" disabled>
                            </div>
                        </div>
                        <div class="input-field">
                            <label>근무자 <span class="required">*</span></label>
                            <input type="text" id="worker" size="10" required placeholder="근무자 관등성명">
                        </div>
                    </div>
                </div>

                <div class="form-group-section">
                    <h6 class="section-label">태그</h6>
                    <textarea id="tags" rows="6" placeholder="기타/외형적 특이사항 (,로 구분)"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-submit" onclick="saveTraceLog()">
                        저장
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM 관리</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="shipTrace.js"></script>
</body>
</html>
