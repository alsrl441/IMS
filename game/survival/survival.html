<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서바이벌 - CCSS</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="survival.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../../index.html" class="nav-link">대시보드</a>
                <a href="../../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <a href="../../shipSearch/shipSearch.html" class="nav-link">선박 찾기</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game.html" class="nav-link game-link active">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="survival-main">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="info-panel">
                <div class="panel-section status-board">
                    <h3>STATUS</h3>
                    <div class="stat-row"><span>LEVEL</span><span id="lvl">1</span></div>
                    <div class="stat-row"><span>KILLS</span><span id="kills">0</span></div>
                    <div class="stat-row"><span>EXP</span><div class="bar-bg"><div id="exp-bar" class="bar-fill"></div></div></div>
                    <div class="stat-row"><span>HP</span><div class="bar-bg"><div id="hp-bar" class="bar-fill hp"></div></div></div>
                </div>

                <div class="panel-section">
                    <h3>INVENTORY</h3>
                    <div id="inv-weapons" class="inv-grid">
                        <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
                    </div>
                    <div id="inv-passives" class="inv-grid" style="margin-top: 5px;">
                        <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>COMBINATION</h3>
                    <ul class="recipe-list">
                        <li>🗡️ + 👟 = ❄️ (수리검)</li>
                        <li>🔫 + 🥊 = 🏎️ (기관총)</li>
                    </ul>
                </div>
                
                <button id="start-btn">작전 개시</button>
            </div>
        </div>
    </main>

    <div id="upgrade-modal" class="modal">
        <div class="modal-content">
            <h2>강화 선택</h2>
            <div id="upgrade-list"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container text-center">
            <div class="btn-group">
                <a href="https://www.google.com" target="_blank" class="btn-outline">Google</a>
                <a href="https://www.youtube.com" target="_blank" class="btn-outline">YouTube</a>
                <a href="https://gemini.google.com" target="_blank" class="btn-outline">Gemini</a>
            </div>
        </div>
    </footer>

    <script src="survival.js"></script>
</body>
</html>
