<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지뢰찾기 - CCSS</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="minesweeper.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../../index.html" class="nav-link">대시보드</a>
                <a href="../../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <a href="../../shipSearch/shipSearch.html" class="nav-link">선박 찾기</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game.html" class="nav-link game-link active">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="mine-main">
        <div class="mine-container">
            <div class="mine-header">
                <div class="stat-box">지뢰: <span id="mine-count">10</span></div>
                <div id="status">&#128522;</div>
                <div class="stat-box">시간: <span id="timer">0</span></div>
            </div>
            <div id="board" class="mine-board"></div>
            <div class="mine-footer">
                <button id="reset-btn">게임 재시작</button>
                <p>클릭: 타일 제거</p>
                <p>우클릭: 깃발 설치</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="btn-group">
                <a href="https://www.google.com" target="_blank" class="btn-outline">Google</a>
                <a href="https://www.youtube.com" target="_blank" class="btn-outline">YouTube</a>
                <a href="https://gemini.google.com" target="_blank" class="btn-outline">Gemini</a>
            </div>
        </div>
    </footer>

    <script src="../../script.js"></script>
    <script src="minesweeper.js"></script>
</body>
</html>
