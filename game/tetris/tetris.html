<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테트리스 - CCSS</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="tetris.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <div class="nav-item">
                    <a href="../../index.html" class="nav-link">대시보드</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">업무</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link active">비업무</a>
                </div>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
            </div>
        </div>

        <div class="mega-menu">
            <div class="mega-menu-container">
                <div class="mega-menu-column">
                    <a href="../../index.html" class="mega-menu-item">대시보드</a>
                </div>
                <div class="mega-menu-column">
                    <a href="../../shipDB/identified/identified.html" class="mega-menu-item">식별 선박 DB</a>
                    <a href="../../shipDB/unidentified/unidentified.html" class="mega-menu-item">미식별 선박 DB</a>
                    <a href="../../shipTrace/shipTrace.html" class="mega-menu-item">선박 추적</a>
                </div>
                <div class="mega-menu-column">
                    <a href="../../personnel/personnel.html" class="mega-menu-item">인사 정보</a>
                    <a href="../game.html" class="mega-menu-item game-link">놀이터</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="tetris-main">
        <div class="tetris-container">
            <div class="game-area">
                <canvas id="tetris" width="360" height="600"></canvas>
            </div>

            <div class="side-panel">
                <div class="stat-group">
                    <p>NEXT</p>
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
                
                <div class="stat-group">
                    <p>HOLD</p>
                    <canvas id="hold" width="80" height="80"></canvas>
                </div>

                <div class="stat-group">
                    <p>SCORE</p>
                    <div id="score">0</div>
                </div>

                <div class="controls-info">
                    <p>← →: 좌우 이동</p>
                    <p>↑: 회전(시계 방향)</p>
                    <p>Space: 내리기</p>
                    <p>C: 블럭 교체</p>
                    <p>P: 일시정지</p>
                </div>
                <div class="d-flex gap-2">
                    <button id="start-btn" class="flex-grow-1">게임 시작</button>
                    <button id="pause-btn" class="btn-outline" style="padding: 12px; border-radius: 5px; cursor: pointer; display: none;">일시정지</button>
                </div>
            </div>
        </div>

        <div class="ranking-section">
            <h3 class="ranking-title">랭킹 (Top 5)</h3>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>이름</th>
                        <th>점수</th>
                    </tr>
                </thead>
                <tbody id="ranking-list">
                    <!-- 데이터 로딩 중 -->
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="btn-group">
                <a href="../../databaseManager/databaseManager.html" target="_blank" class="btn-outline">DBM</a>
                <a href="#" target="_blank" class="btn-outline">국방인사정보체계</a>
                <a href="#" target="_blank" class="btn-outline">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../../script.js"></script>
    <script src="tetris.js"></script>
</body>
</html>
