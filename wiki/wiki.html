    <main class="wiki-main container py-4">
        <div class="wiki-layout">
            <!-- Content Area (Left/Center) -->
            <article class="wiki-content card">
                <!-- View Mode -->
                <div id="wikiViewArea" class="view-mode">
                    <div class="wiki-header">
                        <h1 id="docTitle" class="wiki-page-title">Wiki</h1>
                        <div class="wiki-actions">
                            <button id="editDocBtn" class="btn-minimal-xs"><i class="fas fa-edit"></i> 편집</button>
                            <button id="deleteDocBtn" class="btn-minimal-xs text-danger"><i class="fas fa-trash"></i> 삭제</button>
                        </div>
                    </div>
                    <div id="wikiLastUpdate" class="wiki-last-update hidden"></div>
                    <div id="wikiToc" class="wiki-toc hidden">
                        <div class="toc-title">목차</div>
                        <ul id="tocList"></ul>
                    </div>
                    <div id="docBody" class="wiki-body">
                        <!-- 마크다운 렌더링 결과가 여기에 표시됨 -->
                        왼쪽에서 문서를 선택하거나 새 문서를 만들어보세요.
                    </div>
                </div>

                <!-- Edit Mode -->
                <div id="wikiEditArea" class="edit-mode hidden">
                    <div class="wiki-header">
                        <input type="text" id="editDocTitle" class="form-control-custom wiki-title-input" placeholder="문서 제목">
                    </div>
                    <div class="wiki-editor-wrapper mt-3">
                        <textarea id="markdownEditor" class="wiki-textarea" placeholder="내용을 작성하세요."></textarea>
                    </div>
                    <div class="wiki-edit-actions mt-3">
                        <button id="saveDocBtn" class="btn-action btn-save">저장</button>
                        <button id="cancelEditBtn" class="btn-action btn-cancel">취소</button>
                    </div>
                </div>
            </article>

            <!-- Sidebar (Right) -->
            <aside class="wiki-sidebar">
                <div class="sidebar-section">
                    <div class="search-box mb-3">
                        <label class="sidebar-title" style="border:none; margin-bottom:5px;">문서 검색</label>
                        <input type="text" id="wikiSearch" class="form-control-custom" placeholder="검색어 입력">
                    </div>
                    <button id="createNewDocBtn" class="btn-action btn-save w-100 mb-4">
                        <i class="fas fa-plus me-2"></i>새 문서
                    </button>
                    <h5 class="sidebar-title">문서 목록</h5>
                    <ul id="allDocs" class="sidebar-list">
                        <!-- JS에서 동적 생성 -->
                    </ul>
                </div>
            </aside>
        </div>
    </main>
