<!DOCTYPE html>
<html lang="ko">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 간단한 드롭다운 스타일 */
        .db-list {
            position: absolute;
            background: #fff;
            border: 1px solid #ccc;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            max-height: 240px;
            overflow: auto;
            z-index: 9999;
            width: 320px;
            font-family: sans-serif;
        }

        .db-list.hidden { display: none; }

        .db-list-item {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }

        .db-list-item:hover,
        .db-list-item:focus {
            background: #f5f7fb;
            outline: none;
        }

        .db-list-empty {
            padding: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- 폼을 만들어서 DB이름, 트랜젝션 이름, 저장소 이름, ID, 이름, 점수를 받아와서 버튼을 누르고 실행 -->
    <!-- 데이터 추가 -->
    <h2>데이터 추가</h2>
    <form id="add-data-form">
        <input type="text" id="add-db-name" placeholder="DB 이름" required>
        <input type="text" id="add-transaction-name" placeholder="트랜젝션 이름" required>
        <input type="text" id="add-store-name" placeholder="저장소 이름" required>
        <input type="text" id="add-name" placeholder="이름" required>
        <input type="number" id="add-score" placeholder="점수" required>
        <button type="submit">데이터 추가</button>
    </form>

    <!-- 데이터 수정 -->
    <h2>데이터 수정</h2>
    <form id="update-data-form">
        <input type="text" id="update-db-name" placeholder="DB 이름" required>
        <input type="text" id="update-transaction-name" placeholder="트랜젝션 이름" required>
        <input type="text" id="update-store-name" placeholder="저장소 이름" required>
        <input type="number" id="update-id" placeholder="ID (숫자)" required>
    <input type="text" id="update-name" class="db-lookup" placeholder="새 이름">
    <input type="number" id="update-score" class="db-lookup" placeholder="새 점수">
        <button type="submit">데이터 수정</button>
    </form>


    <!-- 데이터 삭제 -->
    <h2>데이터 삭제</h2>
    <form id="delete-data-form">
        <input type="text" id="delete-db-name" placeholder="DB 이름" required>
        <input type="text" id="delete-transaction-name" placeholder="트랜젝션 이름" required>
        <input type="text" id="delete-store-name" placeholder="저장소 이름" required>
    <input type="number" id="delete-id" class="db-lookup" placeholder="ID (숫자)" required>
        <button type="submit">데이터 삭제</button>
    </form>


    <script>
        function updateRankingData(targetDB, targetTransaction, targetStore, targetId, newName, newScore) {
            const request = indexedDB.open(targetDB);

            request.onerror = function(event) {
                console.error("❌ DB를 여는 데 실패했어:", event.target.error);
            };

            request.onsuccess = function(event) {
                const db = event.target.result;
                
                const transaction = db.transaction([targetTransaction], "readwrite");
                const store = transaction.objectStore(targetStore);

                const getRequest = store.get(targetId); 
                
                getRequest.onsuccess = function() {
                    const data = getRequest.result;
                    
                    if (!data) {
                        console.error(`❌ ID ${targetId}에 해당하는 데이터를 찾을 수 없어!`);
                        return;
                    }

                    console.log("🔍 수정 전 데이터:", data);

                    if (newName) data.name = newName; 
                    if (newScore !== undefined) data.score = newScore;


                    const updateRequest = store.put(data);
                    
                    updateRequest.onsuccess = function() {
                        console.log(`✅ ID ${targetId} 데이터 수정 성공!`);
                        console.log("✨ 수정 후 데이터:", data);
                        
                        if (typeof renderRankings === "function") {
                            renderRankings();
                        }
                    };

                    updateRequest.onerror = function() {
                        console.error("❌ 데이터 업데이트 실패!");
                    };
                };
            };
        }
    </script>
</script>

    <!-- DB 레코드 목록 표시용 컨테이너 -->
    <div id="__db_list" class="db-list hidden" aria-hidden="true"></div>

    <script>
    (function(){
        const listEl = document.getElementById('__db_list');
        let currentTargetInput = null;

        function hideList() {
            listEl.classList.add('hidden');
            listEl.setAttribute('aria-hidden','true');
            listEl.innerHTML = '';
            currentTargetInput = null;
        }

        function positionListForInput(input) {
            const rect = input.getBoundingClientRect();
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            listEl.style.top = (rect.bottom + scrollTop + 4) + 'px';
            listEl.style.left = (rect.left) + 'px';
            listEl.style.width = Math.max(rect.width, 320) + 'px';
        }

        function fillFormWithRecord(prefix, record) {
            const idEl = document.getElementById(prefix + '-id');
            const nameEl = document.getElementById(prefix + '-name');
            const scoreEl = document.getElementById(prefix + '-score');

            if (idEl) idEl.value = record.id !== undefined ? record.id : (record.key || '');
            if (nameEl && record.name !== undefined) nameEl.value = record.name;
            if (scoreEl && record.score !== undefined) scoreEl.value = record.score;
        }

        function renderList(items, input, prefix) {
            listEl.innerHTML = '';
            if (!items || items.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'db-list-empty';
                empty.textContent = '레코드가 없습니다.';
                listEl.appendChild(empty);
                return;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.tabIndex = 0;
                div.className = 'db-list-item';
                // 표시는 id/name/score 위주로
                const idText = item.id !== undefined ? item.id : (item.key !== undefined ? item.key : '');
                const nameText = item.name !== undefined ? item.name : '';
                const scoreText = item.score !== undefined ? item.score : '';
                div.textContent = `ID: ${idText}    이름: ${nameText}    점수: ${scoreText}`;

                div.addEventListener('click', function(e){
                    fillFormWithRecord(prefix, item);
                    hideList();
                    input.focus();
                });

                div.addEventListener('keydown', function(e){
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        div.click();
                    }
                    if (e.key === 'Escape') {
                        hideList();
                        input.focus();
                    }
                });

                listEl.appendChild(div);
            });
        }

        function fetchAllFromStore(dbName, storeName) {
            return new Promise((resolve, reject) => {
                if (!dbName || !storeName) return resolve([]);
                const req = indexedDB.open(dbName);
                req.onerror = function() { resolve([]); };
                req.onsuccess = function(e) {
                    const db = e.target.result;
                    try {
                        const tx = db.transaction([storeName], 'readonly');
                        const store = tx.objectStore(storeName);
                        // getAll이 있으면 간단하게 사용
                        if (store.getAll) {
                            const g = store.getAll();
                            g.onsuccess = function() { resolve(g.result); };
                            g.onerror = function() { resolve([]); };
                        } else {
                            const items = [];
                            const cursorReq = store.openCursor();
                            cursorReq.onsuccess = function(ev) {
                                const cursor = ev.target.result;
                                if (cursor) {
                                    const v = cursor.value;
                                    // ID를 넣어두면 편리
                                    if (v && v.id === undefined) v.id = cursor.key;
                                    items.push(v);
                                    cursor.continue();
                                } else {
                                    resolve(items);
                                }
                            };
                            cursorReq.onerror = function() { resolve([]); };
                        }
                    } catch(err) {
                        resolve([]);
                    }
                };
            });
        }

        // 클릭 또는 포커스된 입력에서 폼 접두사(예: update, delete)를 추출
        function prefixFromInput(input) {
            const id = input.id || '';
            const parts = id.split('-');
            return parts[0] || '';
        }

        // 입력을 클릭하면 동작
        document.addEventListener('click', async function(e){
            const el = e.target;
            // 클릭이 드롭다운 내부이면 무시
            if (listEl.contains(el)) return;

            if (el.tagName === 'INPUT' && el.classList.contains('db-lookup')) {
                currentTargetInput = el;
                const prefix = prefixFromInput(el);
                const dbNameEl = document.getElementById(prefix + '-db-name');
                const storeNameEl = document.getElementById(prefix + '-store-name');

                if (!dbNameEl || !storeNameEl || !dbNameEl.value || !storeNameEl.value) {
                    // 필요한 값이 없으면 간단 메시지
                    alert('먼저 DB 이름과 저장소 이름을 입력하세요.');
                    return;
                }

                positionListForInput(el);
                listEl.classList.remove('hidden');
                listEl.setAttribute('aria-hidden','false');
                listEl.innerHTML = '<div class="db-list-empty">불러오는 중...</div>';

                const items = await fetchAllFromStore(dbNameEl.value, storeNameEl.value);

                // 저장된 레코드 배열을 렌더
                renderList(items, el, prefix);
            } else {
                // 외부 클릭이면 드롭다운 닫기
                hideList();
            }
        }, true);

        // ESC로 닫기
        document.addEventListener('keydown', function(e){
            if (e.key === 'Escape') hideList();
        });

        // 리사이즈나 스크롤시 위치 재계산
        window.addEventListener('scroll', function(){ if (currentTargetInput) positionListForInput(currentTargetInput); });
        window.addEventListener('resize', function(){ if (currentTargetInput) positionListForInput(currentTargetInput); });
    })();
    </script>
</body>
</html>
