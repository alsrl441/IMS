<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선박 찾기 - CCSS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="shipSearch.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="../milCalc/milCalc.html" class="nav-link">복무 정보</a>
                <a href="shipSearch.html" class="nav-link active">선박 찾기</a>
            </div>
            <div class="navbar-right">
                <div id="realtime-clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="search-layout">
            <!-- 검색 섹션 -->
            <section class="search-box-section mb-5">
                <div class="search-input-wrapper">
                    <input type="text" id="tag-input" class="form-control-lg" placeholder="검색어를 입력해주세요." autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-items"></div>
                </div>
                <div id="selected-tags" class="selected-tags-container mt-3"></div>
            </section>

            <!-- 결과 섹션 -->
            <div id="ship-results" class="ship-results-grid">
                <!-- 결과 카드가 여기에 동적으로 생성됨 -->
            </div>

            <!-- 페이지네이션 -->
            <div id="pagination-container" class="pagination-wrapper mt-4"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="btn-group">
                <a href="https://www.google.com" target="_blank" class="btn-outline">Google</a>
                <a href="https://www.youtube.com" target="_blank" class="btn-outline">YouTube</a>
                <a href="https://gemini.google.com" target="_blank" class="btn-outline">Gemini</a>
            </div>
        </div>
    </footer>

    <script src="shipData.js"></script>
    <script src="../script.js"></script>
    <script src="shipSearch.js"></script>
</body>
</html>
